<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Ankur's Game</title>

<style>

body{
margin:0;
background:black;
color:white;
font-family:Arial;
text-align:center;
overflow:hidden;
}

#hud{
font-size:20px;
margin:10px;
}

canvas{
background:#111;
display:block;
margin:auto;
}

#kiss{
position:fixed;
top:40%;
left:50%;
transform:translate(-50%,-50%);
font-size:40px;
display:none;
z-index:10;
}

#gameover{
position:fixed;
top:45%;
left:50%;
transform:translate(-50%,-50%);
font-size:45px;
display:none;
color:red;
}

#joystickBase{
position:fixed;
bottom:40px;
left:40px;
width:120px;
height:120px;
background:rgba(255,255,255,0.1);
border-radius:60px;
}

#joystick{
position:absolute;
width:60px;
height:60px;
background:white;
border-radius:30px;
left:30px;
top:30px;
}

</style>
</head>

<body>

<div id="hud"></div>

<div id="kiss">
💋<br>
Nainy ka dil<br>
Shubman Gill ❤️
</div>

<div id="gameover">
GAME OVER
</div>

<canvas id="game" width="420" height="420"></canvas>

<div id="joystickBase">
<div id="joystick"></div>
</div>

<script>

const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

let level=1;
let score=0;
let lives=5;
let gameRunning=true;

let moveX=0;
let moveY=0;
let freeze=false;

let nainy={x:60,y:60};
let shubman={x:350,y:350};

let rivals=[
{x:350,y:60,name:"Girl1"},
{x:60,y:350,name:"Girl2"},
{x:200,y:200,name:"Girl3"}
];

let sara={x:200,y:350};

let foods=[];
let heart=null;


/* MUSIC */

const audioCtx=new(window.AudioContext||window.webkitAudioContext)();

function music(){

let osc=audioCtx.createOscillator();
let gain=audioCtx.createGain();

osc.frequency.value=220;
gain.gain.value=0.05;

osc.connect(gain);
gain.connect(audioCtx.destination);

osc.start();

setInterval(()=>{
osc.frequency.value=200+Math.random()*120;
},400);

}

music();


/* HUD */

function updateHUD(){

let hearts="";

for(let i=0;i<lives;i++) hearts+="❤️";

document.getElementById("hud").innerText=
"Level "+level+" | Score "+score+" | Lives "+hearts;

}


/* SPAWN FOOD */

function spawnFood(){

foods=[];

for(let i=0;i<30;i++){

foods.push({
x:Math.random()*380+20,
y:Math.random()*380+20
});

}

heart={
x:Math.random()*380+20,
y:Math.random()*380+20
};

}


/* DRAW */

function drawChar(x,y,emoji,label){

ctx.font="22px Arial";
ctx.fillText(emoji,x,y);

ctx.font="11px Arial";
ctx.fillStyle="white";
ctx.fillText(label,x-20,y-10);

}

function draw(){

ctx.clearRect(0,0,420,420);

/* breadcrumbs */

foods.forEach(f=>{
ctx.fillStyle="yellow";
ctx.beginPath();
ctx.arc(f.x,f.y,3,0,Math.PI*2);
ctx.fill();
});

/* heart */

if(heart){
ctx.font="18px Arial";
ctx.fillText("💖",heart.x,heart.y);
}

drawChar(nainy.x,nainy.y,"👩","Nainy");

rivals.forEach(g=>drawChar(g.x,g.y,"👧",g.name));

drawChar(sara.x,sara.y,"😈","Sara");

/* sara speech */

if(dist(nainy,sara)<120){

ctx.fillStyle="white";
ctx.fillRect(sara.x-60,sara.y-60,120,25);

ctx.fillStyle="black";
ctx.font="12px Arial";
ctx.fillText("Shubman is mine!",sara.x-55,sara.y-43);

}

drawChar(shubman.x,shubman.y,"🧔🏏","Shubman Gill");

}


/* DISTANCE */

function dist(a,b){
return Math.hypot(a.x-b.x,a.y-b.y);
}


/* CHASE */

function chase(e,speed){

let dx=nainy.x-e.x;
let dy=nainy.y-e.y;

let d=Math.sqrt(dx*dx+dy*dy);

e.x+=(dx/d)*speed;
e.y+=(dy/d)*speed;

}


/* RESET */

function reset(){

nainy.x=60;
nainy.y=60;

shubman.x=Math.random()*380+20;
shubman.y=Math.random()*380+20;

spawnFood();

updateHUD();

}


/* WIN */

function win(){

score+=500;
updateHUD();

let kiss=document.getElementById("kiss");
kiss.style.display="block";

setTimeout(()=>{
kiss.style.display="none";
},2000);

level++;

reset();

}


/* LOSE */

function lose(){

lives--;
updateHUD();

if(lives<=0){

gameRunning=false;

document.getElementById("gameover").style.display="block";

return;

}

reset();

}


/* UPDATE */

function update(){

if(!gameRunning) return;

nainy.x+=moveX;
nainy.y+=moveY;

nainy.x=Math.max(10,Math.min(410,nainy.x));
nainy.y=Math.max(10,Math.min(410,nainy.y));

let rivalSpeed=0.3+level*0.05;
let saraSpeed=0.4+level*0.08;

if(!freeze){

rivals.forEach(g=>chase(g,rivalSpeed));
chase(sara,saraSpeed);

}

/* collect breadcrumbs */

foods=foods.filter(f=>{

if(dist(nainy,f)<10){

score+=10;
updateHUD();
return false;

}

return true;

});

/* heart */

if(heart && dist(nainy,heart)<15){

freeze=true;
heart=null;

setTimeout(()=>{
freeze=false;
},3000);

}

/* reach shubman */

if(dist(nainy,shubman)<20) win();

/* collisions */

rivals.forEach(g=>{
if(dist(nainy,g)<20) lose();
});

if(dist(nainy,sara)<20) lose();

draw();

}

setInterval(update,30);

spawnFood();
updateHUD();


/* keyboard */

document.addEventListener("keydown",e=>{

if(e.key==="ArrowUp"){moveY=-2;moveX=0;}
if(e.key==="ArrowDown"){moveY=2;moveX=0;}
if(e.key==="ArrowLeft"){moveX=-2;moveY=0;}
if(e.key==="ArrowRight"){moveX=2;moveY=0;}

});


/* joystick */

let stick=document.getElementById("joystick");

stick.addEventListener("touchmove",e=>{

let rect=stick.parentElement.getBoundingClientRect();

let x=e.touches[0].clientX-rect.left-60;
let y=e.touches[0].clientY-rect.top-60;

moveX=x*0.04;
moveY=y*0.04;

});

stick.addEventListener("touchend",()=>{

moveX=0;
moveY=0;

});

</script>

</body>
</html>
